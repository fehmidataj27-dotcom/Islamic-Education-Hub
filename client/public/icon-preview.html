<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Preview</title>
    <style>
        body { background-color: #f3f4f6; display: flex; gap: 2rem; padding: 2rem; font-family: sans-serif; }
        .icon-container { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        img { border-radius: 20%; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="icon-container">
        <h2>512x512 Android/PWA</h2>
        <img src="/icon-512.png" alt="512 Icon" width="256" height="256" style="border-radius: 50%;">
    </div>
    <div class="icon-container">
        <h2>180x180 Apple Touch (Squircle)</h2>
        <img src="/apple-touch-icon.png" alt="Apple Touch Icon" width="180" height="180">
    </div>
</body>
</html>
